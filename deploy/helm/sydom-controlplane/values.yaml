# 司域控制面 Helm values。生产请覆盖 image.digest / database / secrets / tls / existingSecret。
replicaCount: 2

image:
  repository: sydom/controlplane
  # 优先 digest（对齐 M5.3b 内容寻址防漂移）；digest 非空则忽略 tag。
  digest: ""            # 例：sha256:...
  tag: "latest"
  pullPolicy: IfNotPresent
imagePullSecrets: []

# 外部托管 PG / Redis endpoint。database.dsn 含口令 → 渲染进 Secret（非 ConfigMap）。
database:
  dsn: "postgres://sydom:CHANGEME@postgres:5432/sydom?sslmode=require"
redis:
  addr: "redis:6379"

# 密钥。existingSecret 非空 → 复用既有 Secret（生产推荐，外部注入），chart 不渲染 secret.yaml；
# 该 Secret 须含键 config.yaml/master-key/root-secret[/tls.crt/tls.key/sync-client-ca.crt]。
# existingSecret 为空 → chart 用下方值自建 Secret（起步/非生产便利路径）。
existingSecret: ""
secrets:
  masterKey: ""         # base64，解码须 32 字节（→ SYDOM_MASTER_KEY）
  rootSecret: ""        # 原始字节（→ SYDOM_ROOT_SECRET）

environment: production

# 生产模式传输 TLS（M5.3a fail-close：production 缺 cert/key 拒启动）。
tls:
  enabled: true
  cert: ""              # PEM；existingSecret 为空时写入自建 Secret
  key: ""               # PEM
  syncClientCA: ""      # policysync mTLS（M5.2b）：非空则校验 sidecar 客户端证书

controlPlane:
  rootPrincipal: "root@sydom"
  heartbeatInterval: "30s"
  relayPollInterval: "1s"

ports:
  admin: 8081
  sync: 8082
  health: 8083
  rest: 8084           # REST/JSON 网关（restGateway.enabled 时起监听）
  console: 8085        # Web Console BFF（console.enabled 时起监听）

# REST/JSON 网关（SP2）。默认关；开启则控制面起 rest_addr 监听器、Service 增 rest 端口，
# 可经 Ingress 暴露。生产模式该监听器自持 TLS（同 admin/console，M5.3a fail-close）。
restGateway:
  enabled: false

# Web Console 服务端 BFF（SP3）。默认关；开启则起 console_addr 监听器、Service 增 console 端口。
# baseURL＝对外绝对 URL（OIDC redirect_uri 基址，M6-sso-2；不从请求 Host 派生），
# 经 Ingress 暴露时须 = https://<ingress.hosts.console>；空 → 企业 SSO fail-close（登录流不起）。
console:
  enabled: false
  baseURL: ""          # 例 https://console.sydom.example.com

service:
  type: ClusterIP

# 对外接入（Ingress，M5.3-k8s Ingress）。默认关；需集群已装 ingress-nginx controller。
# 只暴露人/程序面（Console + REST + gRPC AdminService）。安全边界：
#   • policysync mTLS(grpc-sync) 绝不经此终止型 ingress——nginx 会用自身证书代理、
#     丢失 sidecar 客户端证书身份=破坏 mTLS。sidecar 直连 grpc-sync Service（见 NOTES）。
#   • health/metrics 不对外暴露。
# 假定 tls.enabled（后端监听器自持 TLS）：nginx 入口用 ingress TLS 证书对外终止、
# 对后端重加密（gRPC→backend-protocol GRPCS、HTTP→HTTPS）。因该注解是每 Ingress 对象级，
# 故渲染为两个 Ingress：<fullname>-grpc（GRPCS，admin）与 <fullname>-http（HTTPS，console/rest）。
ingress:
  enabled: false
  className: "nginx"
  # 入口对外 TLS（终止）。secretName 指向含 tls.crt/tls.key 的 Secret（cert-manager 或手动创建）。
  tls:
    enabled: true
    secretName: "sydom-controlplane-ingress-tls"
  annotations: {}      # 追加自定义 nginx 注解（backend-protocol 已按面自动注入，勿在此覆盖）
  # 各面独立 host；host 为空则该面不路由。console/rest 还须对应 .enabled=true 才渲染规则。
  hosts:
    console: ""        # 例 console.sydom.example.com（须 = console.baseURL 的主机名）
    rest: ""           # 例 rest.sydom.example.com
    admin: ""          # 例 admin.sydom.example.com（gRPC AdminService，GRPCS）

resources:
  requests: { cpu: 100m, memory: 128Mi }
  limits: { cpu: 500m, memory: 256Mi }

pdb:
  enabled: true
  minAvailable: 1

# 自动扩缩（HPA，M5.3-k8s-ext）。默认关；开启则 Deployment 省略 replicas 交 HPA 管。
# 多副本安全见 M5.4a relay 选主（仅 relay/drain leader-gated，N 副本都服务 gRPC/REST/health）。
autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

# Prometheus Operator 抓取（ServiceMonitor，M5.3-k8s-ext）。默认关；需集群已装 Prometheus Operator CRD。
# 与 podAnnotations 抓取二选一（Operator-native 路径）。
serviceMonitor:
  enabled: false
  interval: "30s"
  path: "/metrics"
  labels: {}          # 供 Prometheus serviceMonitorSelector 匹配

# SLO 告警规则（PrometheusRule，M6-SLO）。默认关；需集群已装 Prometheus Operator CRD。
# 覆盖 M5.1 obs 指标 + M5.4a relay leader；阈值为据 M5.5 基线的推荐默认，据实际流量调优。
# 详见 docs/runbooks/service-level-objectives.md（告警→处置 runbook）。
prometheusRule:
  enabled: false
  labels: {}                      # 供 Prometheus ruleSelector 匹配（如 release: kube-prometheus-stack）
  # 控制面可用性 SLO：只计服务端故障码（Internal/Unknown/Unavailable），排除客户端错误
  # （InvalidArgument/AlreadyExists/FailedPrecondition/NotFound/PermissionDenied，由 M6 error-semantics 细分）。
  grpcFaultRatioWarning: 0.01     # 服务端故障率 >1% 持续 5m → warning（≈99% 成功）
  grpcFaultRatioCritical: 0.05    # >5% 持续 5m → critical
  # 数据面授权 Check 尾延迟 SLO（M5.5 基线：缓存命中 137ns、未命中 rules=100 ~204µs，端到端含 gRPC 往返，留足余量）。
  checkLatencyP99Seconds: 0.05    # p99 >50ms 持续 10m → warning
  # 缓存命中率 SLO（M5.5：命中比未命中快 ~1487×，容量强依赖命中率）。
  cacheHitRatioMin: 0.8           # 命中率 <80% 持续 15m → warning

# 迁移自动化（M5.3-migrate）：pre-install/pre-upgrade hook Job 在滚动前跑嵌入迁移。
migrations:
  enabled: true
  hookWeight: "-5"     # 早于默认 0，迁移先于其它资源
  backoffLimit: 3

# 定时逻辑备份（M5.3-backup）：CronJob 用 postgres 镜像 pg_dump 到 PVC。默认关（目的地/存储部署侧定）。
backup:
  enabled: false
  schedule: "0 3 * * *"          # 每日 03:00 UTC
  image: "postgres:17-alpine"
  pvcClaim: ""                    # 备份落此 PVC；enabled 时必填
  retentionDays: "7"
  dsnSecret:                      # 含 DATABASE_URL 的 Secret 引用
    name: ""
    key: "DATABASE_URL"

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8083"
  prometheus.io/path: "/metrics"

serviceAccount:
  create: true
  name: ""

nameOverride: ""
fullnameOverride: ""
nodeSelector: {}
tolerations: []
affinity: {}
