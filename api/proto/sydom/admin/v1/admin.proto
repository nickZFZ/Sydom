syntax = "proto3";

package sydom.admin.v1;

option go_package = "github.com/nickZFZ/Sydom/gen/sydom/admin/v1;adminv1";

// AdminService 是控制面管理写入面（gRPC 优先；REST 后补）。
// 认证：HMAC（复用 ② auth，metadata 携 operator principal + 签名）。
// 鉴权：每个写 RPC 由服务端按 (resource, action, app_id 域) 做元-RBAC 校验。
service AdminService {
  // —— 业务策略写（下沉 PolicyManager）——
  rpc CreateRole(CreateRoleRequest) returns (CreateRoleResponse);
  rpc DeleteRole(DeleteRoleRequest) returns (WriteResponse);
  rpc UpsertPermission(UpsertPermissionRequest) returns (UpsertPermissionResponse);
  rpc GrantPermission(GrantPermissionRequest) returns (WriteResponse);
  rpc RevokePermission(RevokePermissionRequest) returns (WriteResponse);
  rpc AddRoleInheritance(RoleInheritanceRequest) returns (WriteResponse);
  rpc RemoveRoleInheritance(RoleInheritanceRequest) returns (WriteResponse);
  rpc BindUserRole(UserRoleRequest) returns (WriteResponse);
  rpc UnbindUserRole(UserRoleRequest) returns (WriteResponse);
  rpc UpsertDataPolicy(UpsertDataPolicyRequest) returns (UpsertDataPolicyResponse);
  rpc DeleteDataPolicy(DeleteDataPolicyRequest) returns (WriteResponse);

  // —— 应用管理 ——
  rpc CreateApplication(CreateApplicationRequest) returns (CreateApplicationResponse);
  rpc SetApplicationStatus(SetApplicationStatusRequest) returns (WriteResponse);
  rpc ListApplications(ListApplicationsRequest) returns (ListApplicationsResponse);

  // —— 管理员自身管理（system 域，super-admin 专属）——
  rpc CreateOperator(CreateOperatorRequest) returns (CreateOperatorResponse);
  rpc SetOperatorStatus(SetOperatorStatusRequest) returns (WriteResponse);
  rpc CreateAdminRole(CreateAdminRoleRequest) returns (CreateAdminRoleResponse);
  rpc GrantAdminRole(GrantAdminRoleRequest) returns (WriteResponse);
  rpc BindOperatorRole(BindOperatorRoleRequest) returns (WriteResponse);

  // —— M2.1 撤权对称 + Secret 硬切换 ——
  rpc RevokeAdminGrant(RevokeAdminGrantRequest) returns (WriteResponse);
  rpc UnbindOperatorRole(UnbindOperatorRoleRequest) returns (WriteResponse);
  rpc RotateApplicationSecret(RotateApplicationSecretRequest) returns (RotateApplicationSecretResponse);
  rpc ResetOperatorSecret(ResetOperatorSecretRequest) returns (ResetOperatorSecretResponse);

  // —— 业务语言运营台（M1.4）——
  rpc CreateBusinessRole(CreateBusinessRoleRequest) returns (CreateBusinessRoleResponse);

  // —— 读面（SP1：只读 List，REST/Console 展示现状用）——
  rpc ListRoles(ListRolesRequest) returns (ListRolesResponse);
  rpc ListPermissions(ListPermissionsRequest) returns (ListPermissionsResponse);
  rpc ListGrants(ListGrantsRequest) returns (ListGrantsResponse);
  rpc ListRoleInheritances(ListRoleInheritancesRequest) returns (ListRoleInheritancesResponse);
  rpc ListUserBindings(ListUserBindingsRequest) returns (ListUserBindingsResponse);
  rpc ListDataPolicies(ListDataPoliciesRequest) returns (ListDataPoliciesResponse);
  rpc ListOperators(ListOperatorsRequest) returns (ListOperatorsResponse);
  rpc ListAdminRoles(ListAdminRolesRequest) returns (ListAdminRolesResponse);

  // —— 反查 / 有效权限（M1.3）——
  rpc GetEffectivePermissions(GetEffectivePermissionsRequest) returns (GetEffectivePermissionsResponse);

  // —— M1.2 账户层 ——
  rpc RegisterTenant(RegisterTenantRequest) returns (RegisterTenantResponse); // 免鉴权
  rpc ListMyTenants(ListMyTenantsRequest)   returns (ListMyTenantsResponse);  // self
  rpc InviteMember(InviteMemberRequest)     returns (InviteMemberResponse);   // tenant-target
  rpc ListMembers(ListMembersRequest)       returns (ListMembersResponse);    // tenant-target 读
}

// WriteResponse 是写类 RPC 通用响应：回带写后版本（无策略影响时 version 同当前、changed=false）。
message WriteResponse {
  uint64 version = 1;
  bool changed = 2;
}

message CreateRoleRequest {
  uint64 app_id = 1;
  string code = 2;
  string name = 3;
}
message CreateRoleResponse {
  int64 role_id = 1;
  uint64 version = 2;
  bool changed = 3;
}
message DeleteRoleRequest {
  uint64 app_id = 1;
  int64 role_id = 2;
}
message UpsertPermissionRequest {
  uint64 app_id = 1;
  string code = 2;
  string resource = 3;
  string action = 4;
  string ptype = 5;
  string name = 6;
}
message UpsertPermissionResponse {
  int64 permission_id = 1;
  uint64 version = 2;
  bool changed = 3;
}
message GrantPermissionRequest {
  uint64 app_id = 1;
  int64 role_id = 2;
  int64 permission_id = 3;
  string eft = 4; // "allow" / "deny"
}
message RevokePermissionRequest {
  uint64 app_id = 1;
  int64 role_id = 2;
  int64 permission_id = 3;
}
message RoleInheritanceRequest {
  uint64 app_id = 1;
  int64 child_role_id = 2;
  int64 parent_role_id = 3;
}
message UserRoleRequest {
  uint64 app_id = 1;
  string user_id = 2;
  int64 role_id = 3;
}
message UpsertDataPolicyRequest {
  uint64 app_id = 1;
  int64 id = 2; // 0=新增
  string subject_type = 3;
  string subject_id = 4;
  string resource = 5;
  string condition = 6; // 条件树 JSON
  string effect = 7;    // "allow" / "deny"；空串按 "allow"
  string description = 8; // 业务说明（运营台简记，纯元数据，不参与求值）
}
message UpsertDataPolicyResponse {
  int64 data_policy_id = 1;
  uint64 version = 2;
  bool changed = 3;
}
message DeleteDataPolicyRequest {
  uint64 app_id = 1;
  int64 data_policy_id = 2;
}

message CreateApplicationRequest {
  reserved 1;             // 旧 tenant_name 字段号，禁止重用（避免 wire 破坏）
  reserved "tenant_name";
  uint64 tenant_id = 5;
  string domain    = 2;
  string name      = 3;
  string app_key   = 4;
}
message CreateApplicationResponse {
  uint64 app_id = 1;
  string app_secret = 2; // 明文仅此一次返回，服务端只存加密
}
message SetApplicationStatusRequest {
  uint64 app_id = 1;
  uint32 status = 2; // 1=active, 2=disabled
}
message ListApplicationsRequest { uint64 tenant_id = 1; }
message ApplicationSummary {
  uint64 app_id = 1;
  string domain = 2;
  string name = 3;
  string app_key = 4;
  uint32 status = 5;
  uint64 current_version = 6;
}
message ListApplicationsResponse {
  repeated ApplicationSummary applications = 1;
}

message CreateOperatorRequest {
  string principal = 1;
}
message CreateOperatorResponse {
  int64 operator_id = 1;
  string secret = 2; // 明文仅此一次返回
}
message SetOperatorStatusRequest {
  int64 operator_id = 1;
  uint32 status = 2;
}
message CreateAdminRoleRequest {
  string code = 1;
  string name = 2;
}
message CreateAdminRoleResponse {
  int64 role_id = 1;
}
message GrantAdminRoleRequest {
  int64 role_id = 1;
  string domain = 2;   // app_id 字符串或 "*"
  string resource = 3;
  string action = 4;
}
message BindOperatorRoleRequest {
  int64 operator_id = 1;
  int64 role_id = 2;
  string domain = 3;
}

// —— M2.1 撤权对称 + Secret 硬切换 ——
message RevokeAdminGrantRequest {
  int64 role_id = 1;
  string domain = 2;   // app_id 字符串或 "*"
  string resource = 3;
  string action = 4;
}
message UnbindOperatorRoleRequest {
  int64 operator_id = 1;
  int64 role_id = 2;
  string domain = 3;
}
message RotateApplicationSecretRequest { uint64 app_id = 1; }
message RotateApplicationSecretResponse { string app_secret = 1; } // 明文仅此一次返回，服务端只存加密
message ResetOperatorSecretRequest { int64 operator_id = 1; }
message ResetOperatorSecretResponse { string secret = 1; } // 明文仅此一次返回

// —— SP1 读面消息（app-域 6 个）——
message RoleSummary {
  int64 role_id = 1;
  string code = 2;
  string name = 3;
  string description = 4;
}
message ListRolesRequest { uint64 app_id = 1; }
message ListRolesResponse { repeated RoleSummary roles = 1; }

message PermissionSummary {
  int64 permission_id = 1;
  string code = 2;
  string resource = 3;
  string action = 4;
  string ptype = 5; // 对应 DB 列 permission.type
  string name = 6;
  string source = 7; // manual|auto（SDK D 语义）
}
message ListPermissionsRequest { uint64 app_id = 1; }
message ListPermissionsResponse { repeated PermissionSummary permissions = 1; }

message GrantSummary {
  int64 grant_id = 1;
  int64 role_id = 2;
  int64 permission_id = 3;
  string eft = 4; // allow|deny
}
message ListGrantsRequest {
  uint64 app_id = 1;
  int64 role_id = 2; // 0 = 全部
}
message ListGrantsResponse { repeated GrantSummary grants = 1; }

message RoleInheritanceSummary {
  int64 inheritance_id = 1;
  int64 parent_role_id = 2;
  int64 child_role_id = 3;
}
message ListRoleInheritancesRequest { uint64 app_id = 1; }
message ListRoleInheritancesResponse { repeated RoleInheritanceSummary inheritances = 1; }

message UserBindingSummary {
  int64 binding_id = 1;
  string user_id = 2;
  int64 role_id = 3;
}
message ListUserBindingsRequest {
  uint64 app_id = 1;
  string user_id = 2; // "" = 全部
}
message ListUserBindingsResponse { repeated UserBindingSummary bindings = 1; }

message DataPolicySummary {
  int64 data_policy_id = 1;
  string subject_type = 2;
  string subject_id = 3;
  string resource = 4;
  string condition = 5; // 原始 JSON 串
  string effect = 6;    // allow|deny
  uint64 version = 7;
  string description = 8;
}
message ListDataPoliciesRequest {
  uint64 app_id = 1;
  string resource = 2; // "" = 全部
}
message ListDataPoliciesResponse { repeated DataPolicySummary data_policies = 1; }

// —— SP1 读面消息（system-域 2 个）——
message OperatorSummary { // 永不含 secret
  int64 operator_id = 1;
  string principal = 2;
  uint32 status = 3;
}
message ListOperatorsRequest {}
message ListOperatorsResponse { repeated OperatorSummary operators = 1; }

message AdminRoleSummary {
  int64 role_id = 1;
  string code = 2;
  string name = 3;
}
message ListAdminRolesRequest {}
message ListAdminRolesResponse { repeated AdminRoleSummary roles = 1; }

// —— M1.2 账户层消息 ——
message RegisterTenantRequest  { string tenant_name = 1; string owner_principal = 2; }
message RegisterTenantResponse { uint64 tenant_id = 1; string owner_principal = 2; string owner_secret = 3; }

message ListMyTenantsRequest    {}
message TenantMembershipSummary { uint64 tenant_id = 1; string tenant_name = 2; uint32 tier = 3; }
message ListMyTenantsResponse   { repeated TenantMembershipSummary memberships = 1; bool is_operating_plane = 2; }

message InviteMemberRequest  { uint64 tenant_id = 1; string principal = 2; }
message InviteMemberResponse { uint64 operator_id = 1; string principal = 2; string secret = 3; }

message ListMembersRequest  { uint64 tenant_id = 1; }
message MemberSummary       { uint64 operator_id = 1; string principal = 2; uint32 tier = 3; uint32 status = 4; }
message ListMembersResponse { repeated MemberSummary members = 1; }

// GetEffectivePermissions：反查「某 user 在某 app 能做什么」。app 域 / tenant-scoped 只读。
message GetEffectivePermissionsRequest {
  uint64 app_id = 1;
  string user_id = 2;
}
message GetEffectivePermissionsResponse {
  repeated string roles = 1;                       // 隐式角色闭包（含继承）
  repeated EffectivePermission permissions = 2;    // deny 覆盖后的功能允许集
  repeated DataPolicyPreview data_previews = 3;    // 每 resource 的符号行过滤
}
message EffectivePermission {
  string resource = 1;
  string action = 2;
}
message DataPolicyPreview {
  string resource = 1;
  string match = 2;     // all | none | conditional
  string predicate = 3; // 仅 match=conditional 非空
}

// CreateBusinessRole：业务语言建角色（命名 + 勾能力），后端原子建角色+批量授权。code 系统生成。
message CreateBusinessRoleRequest {
  uint64 app_id = 1;
  string name = 2;
  repeated int64 permission_ids = 3;
}
message CreateBusinessRoleResponse {
  int64 role_id = 1;
  uint64 version = 2;
  bool changed = 3;
}
