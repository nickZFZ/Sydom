syntax = "proto3";

package sydom.admin.v1;

option go_package = "github.com/nickZFZ/Sydom/gen/sydom/admin/v1;adminv1";

// AdminService 是控制面管理写入面（gRPC 优先；REST 后补）。
// 认证：HMAC（复用 ② auth，metadata 携 operator principal + 签名）。
// 鉴权：每个写 RPC 由服务端按 (resource, action, app_id 域) 做元-RBAC 校验。
service AdminService {
  // —— 业务策略写（下沉 PolicyManager）——
  rpc CreateRole(CreateRoleRequest) returns (CreateRoleResponse);
  rpc DeleteRole(DeleteRoleRequest) returns (WriteResponse);
  rpc UpsertPermission(UpsertPermissionRequest) returns (UpsertPermissionResponse);
  rpc GrantPermission(GrantPermissionRequest) returns (WriteResponse);
  rpc RevokePermission(RevokePermissionRequest) returns (WriteResponse);
  rpc AddRoleInheritance(RoleInheritanceRequest) returns (WriteResponse);
  rpc RemoveRoleInheritance(RoleInheritanceRequest) returns (WriteResponse);
  rpc BindUserRole(UserRoleRequest) returns (WriteResponse);
  rpc UnbindUserRole(UserRoleRequest) returns (WriteResponse);
  rpc UpsertDataPolicy(UpsertDataPolicyRequest) returns (UpsertDataPolicyResponse);
  rpc DeleteDataPolicy(DeleteDataPolicyRequest) returns (WriteResponse);

  // —— 应用管理 ——
  rpc CreateApplication(CreateApplicationRequest) returns (CreateApplicationResponse);
  rpc SetApplicationStatus(SetApplicationStatusRequest) returns (WriteResponse);
  rpc ListApplications(ListApplicationsRequest) returns (ListApplicationsResponse);
  rpc GetApplication(GetApplicationRequest) returns (GetApplicationResponse);
  rpc GetTenantUsage(GetTenantUsageRequest) returns (GetTenantUsageResponse);

  // —— 管理员自身管理（system 域，super-admin 专属）——
  rpc CreateOperator(CreateOperatorRequest) returns (CreateOperatorResponse);
  rpc SetOperatorStatus(SetOperatorStatusRequest) returns (WriteResponse);
  rpc CreateAdminRole(CreateAdminRoleRequest) returns (CreateAdminRoleResponse);
  rpc GrantAdminRole(GrantAdminRoleRequest) returns (WriteResponse);
  rpc BindOperatorRole(BindOperatorRoleRequest) returns (WriteResponse);

  // —— M2.1 撤权对称 + Secret 硬切换 ——
  rpc RevokeAdminGrant(RevokeAdminGrantRequest) returns (WriteResponse);
  rpc UnbindOperatorRole(UnbindOperatorRoleRequest) returns (WriteResponse);
  rpc RotateApplicationSecret(RotateApplicationSecretRequest) returns (RotateApplicationSecretResponse);
  rpc ResetOperatorSecret(ResetOperatorSecretRequest) returns (ResetOperatorSecretResponse);

  // —— 业务语言运营台（M1.4）——
  rpc CreateBusinessRole(CreateBusinessRoleRequest) returns (CreateBusinessRoleResponse);

  // —— 读面（SP1：只读 List，REST/Console 展示现状用）——
  rpc ListRoles(ListRolesRequest) returns (ListRolesResponse);
  rpc ListPermissions(ListPermissionsRequest) returns (ListPermissionsResponse);
  rpc ListGrants(ListGrantsRequest) returns (ListGrantsResponse);
  rpc ListRoleInheritances(ListRoleInheritancesRequest) returns (ListRoleInheritancesResponse);
  rpc ListUserBindings(ListUserBindingsRequest) returns (ListUserBindingsResponse);
  rpc ListDataPolicies(ListDataPoliciesRequest) returns (ListDataPoliciesResponse);
  rpc ListOperators(ListOperatorsRequest) returns (ListOperatorsResponse);
  rpc ListAdminRoles(ListAdminRolesRequest) returns (ListAdminRolesResponse);

  // —— 反查 / 有效权限（M1.3）——
  rpc GetEffectivePermissions(GetEffectivePermissionsRequest) returns (GetEffectivePermissionsResponse);

  // —— M2.2 决策可解释性 ——
  rpc ExplainDecision(ExplainDecisionRequest) returns (ExplainDecisionResponse);

  // —— M4.5 开发者数据权限沙箱 ——
  rpc PreviewDataFilter(PreviewDataFilterRequest) returns (PreviewDataFilterResponse);

  // —— M3.3 角色全景 + 决策模拟器 ——
  rpc GetRoleGraph(GetRoleGraphRequest) returns (GetRoleGraphResponse);
  rpc SimulateRoleChange(SimulateRoleChangeRequest) returns (SimulateRoleChangeResponse);

  // —— M1.2 账户层 ——
  rpc RegisterTenant(RegisterTenantRequest) returns (RegisterTenantResponse); // 免鉴权
  rpc ListMyTenants(ListMyTenantsRequest)   returns (ListMyTenantsResponse);  // self
  rpc InviteMember(InviteMemberRequest)     returns (InviteMemberResponse);   // tenant-target
  rpc ListMembers(ListMembersRequest)       returns (ListMembersResponse);    // tenant-target 读

  // —— 审计查询 + 变更历史（M2.3）——
  rpc QueryAuditLog(QueryAuditLogRequest) returns (QueryAuditLogResponse);            // app 域，scopeApp
  rpc QueryAdminAuditLog(QueryAdminAuditLogRequest) returns (QueryAdminAuditLogResponse); // admin 域，scopeTenant

  // —— 业务语言预设模板（M3.2）——
  rpc ListTemplates(ListTemplatesRequest) returns (ListTemplatesResponse);
  rpc ApplyTemplate(ApplyTemplateRequest) returns (ApplyTemplateResponse);

  // —— 租户自有模板（M3.2c-2）——
  rpc SaveAppAsTemplate(SaveAppAsTemplateRequest) returns (TenantTemplateRef);
  rpc ListTenantTemplates(ListTenantTemplatesRequest) returns (ListTenantTemplatesResponse);
  rpc GetTenantTemplate(GetTenantTemplateRequest) returns (TenantTemplate);
  rpc ApplyTenantTemplate(ApplyTenantTemplateRequest) returns (ApplyTemplateResponse);
  rpc DeleteTenantTemplate(DeleteTenantTemplateRequest) returns (WriteResponse);

  // —— M4.1 策略即代码（导出/导入）——
  rpc ExportAppPolicy(ExportAppPolicyRequest) returns (ExportAppPolicyResponse);
  rpc ImportAppPolicy(ImportAppPolicyRequest) returns (ImportAppPolicyResponse);

  // —— M4.2 批量操作（app 域移除族，全原子+幂等即 no-op，勾选即操作 source-agnostic）——
  rpc BatchUnbindUserRole       (BatchUnbindUserRoleRequest)        returns (BatchWriteResponse);
  rpc BatchRevokePermission     (BatchRevokePermissionRequest)      returns (BatchWriteResponse);
  rpc BatchRemoveRoleInheritance(BatchRemoveRoleInheritanceRequest) returns (BatchWriteResponse);
  rpc BatchDeleteRole           (BatchDeleteRoleRequest)            returns (BatchWriteResponse);
  rpc BatchDeleteDataPolicy     (BatchDeleteDataPolicyRequest)      returns (BatchWriteResponse);
}

// WriteResponse 是写类 RPC 通用响应：回带写后版本（无策略影响时 version 同当前、changed=false）。
message WriteResponse {
  uint64 version = 1;
  bool changed = 2;
}

message CreateRoleRequest {
  uint64 app_id = 1;
  string code = 2;
  string name = 3;
}
message CreateRoleResponse {
  int64 role_id = 1;
  uint64 version = 2;
  bool changed = 3;
}
message DeleteRoleRequest {
  uint64 app_id = 1;
  int64 role_id = 2;
}
message UpsertPermissionRequest {
  uint64 app_id = 1;
  string code = 2;
  string resource = 3;
  string action = 4;
  string ptype = 5;
  string name = 6;
}
message UpsertPermissionResponse {
  int64 permission_id = 1;
  uint64 version = 2;
  bool changed = 3;
}
message GrantPermissionRequest {
  uint64 app_id = 1;
  int64 role_id = 2;
  int64 permission_id = 3;
  string eft = 4; // "allow" / "deny"
}
message RevokePermissionRequest {
  uint64 app_id = 1;
  int64 role_id = 2;
  int64 permission_id = 3;
}
message RoleInheritanceRequest {
  uint64 app_id = 1;
  int64 child_role_id = 2;
  int64 parent_role_id = 3;
}
message UserRoleRequest {
  uint64 app_id = 1;
  string user_id = 2;
  int64 role_id = 3;
}
message UpsertDataPolicyRequest {
  uint64 app_id = 1;
  int64 id = 2; // 0=新增
  string subject_type = 3;
  string subject_id = 4;
  string resource = 5;
  string condition = 6; // 条件树 JSON
  string effect = 7;    // "allow" / "deny"；空串按 "allow"
  string description = 8; // 业务说明（运营台简记，纯元数据，不参与求值）
}
message UpsertDataPolicyResponse {
  int64 data_policy_id = 1;
  uint64 version = 2;
  bool changed = 3;
}
message DeleteDataPolicyRequest {
  uint64 app_id = 1;
  int64 data_policy_id = 2;
}

message CreateApplicationRequest {
  reserved 1;             // 旧 tenant_name 字段号，禁止重用（避免 wire 破坏）
  reserved "tenant_name";
  uint64 tenant_id = 5;
  string domain    = 2;
  string name      = 3;
  string app_key   = 4;
}
message CreateApplicationResponse {
  uint64 app_id = 1;
  string app_secret = 2; // 明文仅此一次返回，服务端只存加密
}
message SetApplicationStatusRequest {
  uint64 app_id = 1;
  uint32 status = 2; // 1=active, 2=disabled
}
message ListApplicationsRequest { uint64 tenant_id = 1; ListPage page = 2; int32 status = 3; }   // status 过滤
message ApplicationSummary {
  uint64 app_id = 1;
  string domain = 2;
  string name = 3;
  string app_key = 4;
  uint32 status = 5;
  uint64 current_version = 6;
}
message ListApplicationsResponse {
  repeated ApplicationSummary applications = 1;
  uint32 total = 2;
}
message GetApplicationRequest { uint64 app_id = 1; }
message GetApplicationResponse { ApplicationSummary application = 1; }
message GetTenantUsageRequest { uint64 tenant_id = 1; }
message ResourceUsage { uint32 used = 1; uint32 limit = 2; }
message GetTenantUsageResponse {
  string plan_name = 1;
  ResourceUsage applications = 2;
  ResourceUsage members = 3;
}

message CreateOperatorRequest {
  string principal = 1;
}
message CreateOperatorResponse {
  int64 operator_id = 1;
  string secret = 2; // 明文仅此一次返回
}
message SetOperatorStatusRequest {
  int64 operator_id = 1;
  uint32 status = 2;
}
message CreateAdminRoleRequest {
  string code = 1;
  string name = 2;
}
message CreateAdminRoleResponse {
  int64 role_id = 1;
}
message GrantAdminRoleRequest {
  int64 role_id = 1;
  string domain = 2;   // app_id 字符串或 "*"
  string resource = 3;
  string action = 4;
}
message BindOperatorRoleRequest {
  int64 operator_id = 1;
  int64 role_id = 2;
  string domain = 3;
}

// —— M2.1 撤权对称 + Secret 硬切换 ——
message RevokeAdminGrantRequest {
  int64 role_id = 1;
  string domain = 2;   // app_id 字符串或 "*"
  string resource = 3;
  string action = 4;
}
message UnbindOperatorRoleRequest {
  int64 operator_id = 1;
  int64 role_id = 2;
  string domain = 3;
}
message RotateApplicationSecretRequest { uint64 app_id = 1; }
message RotateApplicationSecretResponse { string app_secret = 1; } // 明文仅此一次返回，服务端只存加密
message ResetOperatorSecretRequest { int64 operator_id = 1; }
message ResetOperatorSecretResponse { string secret = 1; } // 明文仅此一次返回

// —— SP1 读面消息（app-域 6 个）——
message RoleSummary {
  int64 role_id = 1;
  string code = 2;
  string name = 3;
  string description = 4;
}
message ListRolesRequest { uint64 app_id = 1; ListPage page = 2; }
message ListRolesResponse { repeated RoleSummary roles = 1; uint32 total = 2; }

message PermissionSummary {
  int64 permission_id = 1;
  string code = 2;
  string resource = 3;
  string action = 4;
  string ptype = 5; // 对应 DB 列 permission.type
  string name = 6;
  string source = 7; // manual|auto（SDK D 语义）
}
message ListPermissionsRequest { uint64 app_id = 1; ListPage page = 2; string source = 3; }      // source 过滤 manual|auto
message ListPermissionsResponse { repeated PermissionSummary permissions = 1; uint32 total = 2; }

message GrantSummary {
  int64 grant_id = 1;
  int64 role_id = 2;
  int64 permission_id = 3;
  string eft = 4; // allow|deny
}
message ListGrantsRequest {
  uint64 app_id = 1;
  int64 role_id = 2; // 0 = 全部
  ListPage page = 3;
}
message ListGrantsResponse { repeated GrantSummary grants = 1; uint32 total = 2; }

message RoleInheritanceSummary {
  int64 inheritance_id = 1;
  int64 parent_role_id = 2;
  int64 child_role_id = 3;
}
message ListRoleInheritancesRequest { uint64 app_id = 1; ListPage page = 2; }
message ListRoleInheritancesResponse { repeated RoleInheritanceSummary inheritances = 1; uint32 total = 2; }

message UserBindingSummary {
  int64 binding_id = 1;
  string user_id = 2;
  int64 role_id = 3;
}
message ListUserBindingsRequest {
  uint64 app_id = 1;
  string user_id = 2; // "" = 全部
  ListPage page = 3;
}
message ListUserBindingsResponse { repeated UserBindingSummary bindings = 1; uint32 total = 2; }

message DataPolicySummary {
  int64 data_policy_id = 1;
  string subject_type = 2;
  string subject_id = 3;
  string resource = 4;
  string condition = 5; // 原始 JSON 串
  string effect = 6;    // allow|deny
  uint64 version = 7;
  string description = 8;
}
message ListDataPoliciesRequest {
  uint64 app_id = 1;
  string resource = 2; // "" = 全部
  ListPage page = 3;
  string effect = 4; // effect 过滤 allow|deny
}
message ListDataPoliciesResponse { repeated DataPolicySummary data_policies = 1; uint32 total = 2; }

// —— SP1 读面消息（system-域 2 个）——
message OperatorSummary { // 永不含 secret
  int64 operator_id = 1;
  string principal = 2;
  uint32 status = 3;
}
message ListOperatorsRequest { ListPage page = 1; int32 status = 2; }                            // status 过滤；0=不过滤(状态用 1/2，0 表缺省)
message ListOperatorsResponse { repeated OperatorSummary operators = 1; uint32 total = 2; }

message AdminRoleSummary {
  int64 role_id = 1;
  string code = 2;
  string name = 3;
}
message ListAdminRolesRequest { ListPage page = 1; }
message ListAdminRolesResponse { repeated AdminRoleSummary roles = 1; uint32 total = 2; }

// —— M1.2 账户层消息 ——
message RegisterTenantRequest  { string tenant_name = 1; string owner_principal = 2; }
message RegisterTenantResponse { uint64 tenant_id = 1; string owner_principal = 2; string owner_secret = 3; }

message ListMyTenantsRequest    { ListPage page = 1; }
message TenantMembershipSummary { uint64 tenant_id = 1; string tenant_name = 2; uint32 tier = 3; }
message ListMyTenantsResponse   { repeated TenantMembershipSummary memberships = 1; bool is_operating_plane = 2; uint32 total = 3; }

message InviteMemberRequest  { uint64 tenant_id = 1; string principal = 2; }
message InviteMemberResponse { uint64 operator_id = 1; string principal = 2; string secret = 3; }

message ListMembersRequest  { uint64 tenant_id = 1; ListPage page = 2; int32 tier = 3; }          // tier 过滤
message MemberSummary       { uint64 operator_id = 1; string principal = 2; uint32 tier = 3; uint32 status = 4; }
message ListMembersResponse { repeated MemberSummary members = 1; uint32 total = 2; }

// GetEffectivePermissions：反查「某 user 在某 app 能做什么」。app 域 / tenant-scoped 只读。
message GetEffectivePermissionsRequest {
  uint64 app_id = 1;
  string user_id = 2;
}
message GetEffectivePermissionsResponse {
  repeated string roles = 1;                       // 隐式角色闭包（含继承）
  repeated EffectivePermission permissions = 2;    // deny 覆盖后的功能允许集
  repeated DataPolicyPreview data_previews = 3;    // 每 resource 的符号行过滤
}
message EffectivePermission {
  string resource = 1;
  string action = 2;
}
message DataPolicyPreview {
  string resource = 1;
  string match = 2;     // all | none | conditional
  string predicate = 3; // 仅 match=conditional 非空
}

// —— M2.2 决策可解释性 ——
message ExplainDecisionRequest {
  uint64 app_id   = 1;
  string user_id  = 2;
  string resource = 3;
  string action   = 4;
}
message DecidingRule {                 // 由 EnforceEx 的 [sub,dom,obj,act,eft] 解构；默认拒绝时为空
  string subject  = 1;                 // 携带判定的角色码（或 user 直授）
  string resource = 2;
  string action   = 3;
  string effect   = 4;                 // allow | deny
}
message DecisionDataScope {
  string match     = 1;                // all | none | conditional
  string predicate = 2;                // 仅 conditional 非空（符号，$user.xxx 保留）
}
message ExplainDecisionResponse {
  bool   allowed                = 1;
  string reason                 = 2;   // ALLOW_GRANTED | DENY_OVERRIDDEN | DENY_NO_MATCH
  DecidingRule deciding_rule    = 3;
  string deciding_role          = 4;
  repeated string roles         = 5;   // 用户有效角色(含继承, casbin 角色码)
  DecisionDataScope data_scope  = 6;
}

// —— M4.5 开发者数据权限沙箱：预览数据策略渲染出的参数化 SQL 片段（与 Sidecar 数据面同源渲染）——
message PreviewDataFilterRequest {
  uint64 app_id = 1;
  string subject = 2;
  string resource = 3;
  map<string, string> attrs = 4;
}
message PreviewDataFilterResponse {
  string sql = 1;
  repeated string args = 2;
}

// CreateBusinessRole：业务语言建角色（命名 + 勾能力），后端原子建角色+批量授权。code 系统生成。
message CreateBusinessRoleRequest {
  uint64 app_id = 1;
  string name = 2;
  repeated int64 permission_ids = 3;
}
message CreateBusinessRoleResponse {
  int64 role_id = 1;
  uint64 version = 2;
  bool changed = 3;
}

// —— 审计查询（M2.3）——
// 标量 NULL 约定：tenant_id=0 表示纯系统级(NULL)；version/admin_version=0 表示无版本/缺省。
message QueryAuditLogRequest {
  uint64 app_id      = 1; // path 权威
  string entity_type = 2;
  string entity_id   = 3; // per-entity 变更历史
  string action      = 4;
  string operator    = 5;
  string since       = 6; // RFC3339，可选
  string until       = 7;
  uint64 cursor      = 8; // keyset：上页最后 id；0=首页
  uint32 limit       = 9;
}
message AuditEntry {
  uint64 id          = 1;
  string operator    = 2;
  string action      = 3;
  string entity_type = 4;
  string entity_id   = 5;
  string diff        = 6; // JSON 文本(原样)
  uint64 version     = 7;
  string created_at  = 8; // RFC3339
}
message QueryAuditLogResponse {
  repeated AuditEntry entries = 1;
  uint64 next_cursor          = 2;
}
message QueryAdminAuditLogRequest {
  uint64 tenant_id   = 1; // 权威：0→超管全量；非 0→该租户
  string entity_type = 2;
  string entity_id   = 3;
  string action      = 4;
  string operator    = 5;
  string since       = 6;
  string until       = 7;
  uint64 cursor      = 8;
  uint32 limit       = 9;
}
message AdminAuditEntry {
  uint64 id            = 1;
  uint64 tenant_id     = 2; // 0=纯系统级
  string operator      = 3;
  string action        = 4;
  string entity_type   = 5;
  string entity_id     = 6;
  string diff          = 7;
  uint64 admin_version = 8;
  string created_at    = 9;
}
message QueryAdminAuditLogResponse {
  repeated AdminAuditEntry entries = 1;
  uint64 next_cursor               = 2;
}

// —— List 分页信封（M2.4，11 个 List 请求共用）——
message ListPage {
  uint32 limit  = 1;  // 0→默认 50，上限 200（clampLimit）
  uint32 offset = 2;  // 跳过条数；与 limit 配合分页
  string sort   = 3;  // 列名，服务端白名单校验；空/非法→默认列
  string order  = 4;  // "asc"|"desc"；空/非法→默认
  string q      = 5;  // 子串搜索，服务端白名单字段 ILIKE
}

// —— 业务语言预设模板（M3.2）——
message TemplatePermission {
  string code = 1;
  string resource = 2;
  string action = 3;
  string type = 4;
  string name = 5;
  string description = 6;
}

message TemplateRole {
  string key = 1;
  string name = 2;
  string description = 3;
  repeated string permission_codes = 4;
  repeated TemplateDataScope data_scopes = 5;
}

message TemplateDataScope {
  string resource = 1;
  string effect = 2;
  string condition = 3; // 条件树 JSON 串（$user.xxx 符号；原样透传）
}

message Template {
  string id = 1;
  string name = 2;
  string description = 3;
  uint32 version = 4;
  repeated TemplatePermission permissions = 5;
  repeated TemplateRole roles = 6;
}

message ListTemplatesRequest { uint64 app_id = 1; }
message ListTemplatesResponse { repeated Template templates = 1; }

message ApplyTemplateRequest {
  uint64 app_id = 1;
  string template_id = 2;
}
message ApplyTemplateResponse {
  uint32 permissions_upserted = 1;
  uint32 permissions_skipped = 2;
  uint32 roles_created = 3;
  uint32 roles_skipped = 4;
  uint32 data_scopes_created = 5;
}

// —— 租户自有模板（M3.2c-2）——
message SaveAppAsTemplateRequest {
  uint64 app_id = 1;
  string name = 2;
  string description = 3;
}
message TenantTemplateRef {
  uint64 id = 1;
  string name = 2;
}
message ListTenantTemplatesRequest {
  uint64 tenant_id = 1;
  ListPage page = 2;
}
message TenantTemplateSummary {
  uint64 id = 1;
  string name = 2;
  string description = 3;
  uint64 source_app_id = 4;
}
message ListTenantTemplatesResponse {
  repeated TenantTemplateSummary templates = 1;
  uint32 total = 2;
}
message GetTenantTemplateRequest {
  uint64 tenant_id = 1;
  uint64 template_id = 2;
}
message TenantTemplate {
  uint64 id = 1;
  string name = 2;
  string description = 3;
  uint64 source_app_id = 4;
  repeated TemplatePermission permissions = 5;
  repeated TemplateRole roles = 6;
}
message ApplyTenantTemplateRequest {
  uint64 app_id = 1;
  uint64 template_id = 2;
}
message DeleteTenantTemplateRequest {
  uint64 tenant_id = 1;
  uint64 template_id = 2;
}

// —— M3.3 角色全景 + 决策模拟器 ——
message GetRoleGraphRequest { uint64 app_id = 1; int64 role_id = 2; }

message RoleGraphCapability {
  string resource = 1;
  string action   = 2;
  string name     = 3;   // 权限点原始 name（Console 经 bizterm 渲染业务名）
  string source   = 4;   // "direct" 或贡献该能力的父角色显示名
}
message RoleGraphParent { int64 id = 1; string code = 2; string name = 3; }
message RoleGraphDataScope {
  string resource  = 1;
  string effect    = 2;   // allow | deny
  string condition = 3;   // 原始条件树 JSON（Console 经 conditionPredicate 渲符号谓词）
}
message GetRoleGraphResponse {
  int64  role_id   = 1;
  string role_code = 2;
  string role_name = 3;
  repeated string bound_users               = 4;
  repeated RoleGraphCapability capabilities = 5;
  repeated RoleGraphParent parents          = 6;
  repeated RoleGraphDataScope data_scopes   = 7;
}

enum RoleChangeType { ROLE_CHANGE_UNSPECIFIED = 0; BIND_USER = 1; ADD_CAPABILITY = 2; }

message SimulateRoleChangeRequest {
  uint64 app_id  = 1;
  int64  role_id = 2;
  RoleChangeType change_type = 3;
  string user_id  = 4;   // BIND_USER
  string resource = 5;   // ADD_CAPABILITY
  string action   = 6;   // ADD_CAPABILITY
}
message SubjectDiff {
  string user_id = 1;
  repeated EffectivePermission added_permissions   = 2;   // 复用既有 message
  repeated EffectivePermission removed_permissions = 3;
  repeated DataPolicyPreview   added_data_previews   = 4; // 复用既有 message（符号 predicate）
  repeated DataPolicyPreview   removed_data_previews = 5;
}
message SimulateRoleChangeResponse { repeated SubjectDiff subjects = 1; }

// —— M4.1 策略即代码（导出/导入）——
message ExportAppPolicyRequest {
  uint64 app_id = 1;
  string format = 2; // "yaml" | "json"
}
message ExportAppPolicyResponse {
  string content = 1;
}
message ImportAppPolicyRequest {
  uint64 app_id = 1;
  string content = 2;
  bool dry_run = 3;
}
message PolicyDiffEntry {
  string kind = 1;        // "create" | "adopt" | "update" | "delete" | "conflict"
  string entity_type = 2; // "permission" | "role" | "data_policy"
  string identity = 3;    // code / key / subject:resource
  string detail = 4;      // 人读差异摘要（绝不含 secret）
}
message ImportAppPolicyResponse {
  repeated PolicyDiffEntry diff = 1;
  bool applied = 2;        // dry_run=true 恒 false
  int64 version = 3;       // apply 后的新版本；dry_run 回当前版本
  int32 creates = 4;
  int32 adopts = 5;
  int32 updates = 6;
  int32 deletes = 7;
  int32 conflicts = 8;
}

// —— M4.2 批量操作（app 域移除族）——
message UserRoleRef    { string user_id = 1; int64 role_id = 2; }
message GrantRef       { int64 role_id = 1; int64 permission_id = 2; }
message InheritanceRef { int64 child_role_id = 1; int64 parent_role_id = 2; }

message BatchUnbindUserRoleRequest        { uint64 app_id = 1; repeated UserRoleRef    items = 2; }
message BatchRevokePermissionRequest      { uint64 app_id = 1; repeated GrantRef       items = 2; }
message BatchRemoveRoleInheritanceRequest { uint64 app_id = 1; repeated InheritanceRef items = 2; }
message BatchDeleteRoleRequest            { uint64 app_id = 1; repeated int64 role_ids = 2; }
message BatchDeleteDataPolicyRequest      { uint64 app_id = 1; repeated int64 data_policy_ids = 2; }

message BatchWriteResponse {
  uint64 version   = 1; // bump 后新版本（全 no-op 时为当前值）
  uint32 requested = 2; // 请求项数
  uint32 applied   = 3; // 实际改变项数（requested−applied = no-op 跳过数）
  bool   changed   = 4; // applied>0 → 已 bump+广播（数据策略批量非空即 changed）
}
