version: v2
modules:
  - path: api/proto
lint:
  use:
    - DEFAULT
  except:
    # 服务名 PolicySync 是 spec 定义的公开契约名，不加 Service 后缀
    - SERVICE_SUFFIX
    # SyncEvent / Snapshot 是 spec 定义的流式事件/快照类型，保留契约语义名
    - RPC_RESPONSE_STANDARD_NAME
    # 写 RPC 共用通用响应 WriteResponse、共用请求消息（RoleInheritance/UserRole 的 add+remove、bind+unbind），契约有意设计
    - RPC_REQUEST_RESPONSE_UNIQUE
    # 共享请求消息（RoleInheritanceRequest/UserRoleRequest）名称不随单个 RPC 名走，契约有意设计
    - RPC_REQUEST_STANDARD_NAME
breaking:
  use:
    - FILE
