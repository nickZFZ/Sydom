database_dsn: "postgres://sydom:sydom@localhost:5432/sydom?sslmode=disable"
redis_addr: "localhost:6379"
admin_addr: ":8081"
sync_addr: ":8082"
root_principal: "root@sydom"
heartbeat_interval: "30s"
relay_poll_interval: "1s"
# Console（服务端 BFF Web 控制台）可选；省略 console_addr 则不启用。
# console_addr: ":8084"
# console_session_ttl: "30m"        # 会话/CSRF 有效期，默认 30m
# console_cookie_insecure: false    # true 仅用于本地明文 HTTP 调试（生产保持 false）
# 可选 TLS（cert/key 须同设，半配置启动失败；缺省=明文，仅本地/测试）：
# tls_cert_file: "/etc/sydom/tls/cert.pem"
# tls_key_file:  "/etc/sydom/tls/key.pem"
# 可选 policysync 通道 mTLS（仅 sync_addr 机对机通道要求 sidecar 出示由此 CA 签发的客户端证书；
# admin/REST/Console 人面通道不受影响。须先设 tls_cert_file/tls_key_file，否则启动失败；缺省=不要求）：
# sync_client_ca_file: "/etc/sydom/tls/sync-client-ca.pem"
# 可选健康口（明文、免鉴权，仅 /healthz + /readyz；缺省不起）：
# health_addr: ":8083"
# 敏感项只走环境变量（不写本文件）：
#   SYDOM_MASTER_KEY  = base64(32 字节 AES-256 主密钥)
#   SYDOM_ROOT_SECRET = root operator 初始 HMAC 密钥
# DB 须先 make migrate-up
