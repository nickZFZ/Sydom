control_plane_addr: "localhost:8082"
app_key: "app-prod-01"
domain: "shop"
auth_addr: "127.0.0.1:8090"
max_staleness: "0s"        # 0=关闭陈旧守卫（!Ready 仍 fail-close）；生产建议显式设非零，如 "90s"
backoff_initial: "500ms"
backoff_max: "30s"
# 运行环境（缺省 development）；production 下 control_plane_tls 必为 true 否则拒绝启动：
# environment: production
# 可选 serve TLS（SDK→sidecar；cert/key 须同设，缺省=明文）：
# tls_cert_file: "/etc/sydom/tls/cert.pem"
# tls_key_file:  "/etc/sydom/tls/key.pem"
# 可选 dial 控制面走 TLS（control_plane_ca_file 空=系统根）：
# control_plane_tls: true
# control_plane_ca_file: "/etc/sydom/tls/ca.pem"
# 可选 mTLS：向控制面 policysync 出示客户端证书（cert/key 须同设，半配置启动失败；
# 缺省=不出示；须与控制面 sync_client_ca_file 的 CA 同源签发）：
# control_plane_client_cert_file: "/etc/sydom/tls/sidecar-client.pem"
# control_plane_client_key_file:  "/etc/sydom/tls/sidecar-client-key.pem"
# 可选健康口（明文、免鉴权；缺省不起）：
# health_addr: ":8091"
# 敏感项只走环境变量（不写本文件）：
#   SYDOM_APP_SECRET = 该 app 的 HMAC 密钥（原始字节，须与控制面建该 app 时设置的一致）
#   或用 SYDOM_APP_SECRET_FILE 指向挂载的密钥文件（与裸 env 二选一，同设报错；尾部空白自动裁剪）。
# 须先有可达的控制面 PolicySync（cmd/sydom-controlplane）
