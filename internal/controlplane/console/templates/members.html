{{define "title"}}成员 · 司域 Console{{end}}
{{define "content"}}
<h2>成员（租户 {{.TenantID}}）</h2>
{{template "searchbox" .Pager}}
<table><thead><tr>
<th><a href="?sort=operator_id&order=asc">ID ↑</a> <a href="?sort=operator_id&order=desc">↓</a></th>
<th><a href="?sort=principal&order=asc">标识 ↑</a> <a href="?sort=principal&order=desc">↓</a></th>
<th><a href="?sort=tier&order=asc">档位 ↑</a> <a href="?sort=tier&order=desc">↓</a></th>
<th>状态</th></tr></thead>
<tbody>{{range .Members}}<tr><td>{{.OperatorId}}</td><td>{{.Principal}}</td><td>{{.Tier}}</td>
<td>{{if eq .Status 1}}启用{{else}}停用{{end}}</td></tr>{{end}}</tbody></table>
{{template "pager" .Pager}}
<h3>邀请成员</h3>
<form method="post" action="/tenants/{{.TenantID}}/members" class="stacked-form">
<input type="hidden" name="csrf_token" value="{{.CSRF}}">
<label>标识 <input name="principal" placeholder="principal" required></label>
<button class="btn-primary">邀请</button>
</form>
{{end}}
