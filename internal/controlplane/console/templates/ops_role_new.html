{{define "title"}}新建业务角色 · 运营台 · App {{.AppID}}{{end}}
{{define "content"}}<div class="workspace">
{{template "ops_appnav" .}}
<section>
<nav class="breadcrumb" aria-label="面包屑">运营台 · 新建业务角色</nav>
<h1>新建业务角色</h1>
<form method="post" action="/ops/apps/{{.AppID}}/roles">
<input type="hidden" name="csrf_token" value="{{.CSRF}}">
<p><label>角色名称<br><input name="name" required placeholder="如：销售经理"></label></p>
<fieldset><legend>包含的能力</legend>
{{range .Permissions}}
<label><input type="checkbox" name="permission_ids" value="{{.PermissionId}}"> {{if .Name}}{{.Name}}{{else}}{{.Resource}}:{{.Action}}{{end}}</label><br>
{{end}}
</fieldset>
<button type="submit" class="btn btn-primary">创建</button>
<a href="/ops/apps/{{.AppID}}/roles">取消</a>
</form>
</section></div>{{end}}
