{{define "title"}}操作员 · 司域 Console{{end}}
{{define "content"}}
<h2>操作员</h2>
<p><a class="btn-primary" href="/operators/new">+ 新建操作员</a></p>
{{template "searchbox" .Pager}}
<table><thead><tr>
<th><a href="?sort=id&order=asc">ID ↑</a> <a href="?sort=id&order=desc">↓</a></th>
<th><a href="?sort=principal&order=asc">Principal ↑</a> <a href="?sort=principal&order=desc">↓</a></th>
<th><a href="?sort=status&order=asc">状态 ↑</a> <a href="?sort=status&order=desc">↓</a></th>
<th>操作</th></tr></thead><tbody>
{{range .Operators}}<tr><td>{{.OperatorId}}</td><td>{{.Principal}}</td>
<td>{{if eq .Status 1}}启用{{else}}停用{{end}}</td>
<td>
<form method="post" action="/operators/{{.OperatorId}}/status" class="inline-form">
<input type="hidden" name="csrf_token" value="{{$.CSRF}}">
<input type="hidden" name="status" value="{{if eq .Status 1}}2{{else}}1{{end}}">
<button>切换状态</button></form>
<form method="post" action="/operators/{{.OperatorId}}/roles" class="inline-form">
<input type="hidden" name="csrf_token" value="{{$.CSRF}}">
<input name="role_id" placeholder="role_id">
<input name="domain" placeholder="domain(app_id 或 *)">
<button>绑定角色</button></form>
<form method="post" action="/operators/{{.OperatorId}}/unbind-role" class="inline-form">
<input type="hidden" name="csrf_token" value="{{$.CSRF}}">
<input name="role_id" placeholder="role_id">
<input name="domain" placeholder="domain(app_id 或 *)">
<button>解绑角色</button></form>
<form method="post" action="/operators/{{.OperatorId}}/reset-secret" class="inline-form">
<input type="hidden" name="csrf_token" value="{{$.CSRF}}">
<button>重置密钥</button></form>
</td></tr>{{end}}
</tbody></table>
{{template "pager" .Pager}}
{{end}}
