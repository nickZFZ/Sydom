{{define "title"}}权限点 · App {{.AppID}}{{end}}
{{define "content"}}<div class="workspace">{{template "appnav" .}}
<section><h2>权限点</h2>
<form method="post" action="/apps/{{.AppID}}/permissions" class="inline-form">
<input type="hidden" name="csrf_token" value="{{.CSRF}}">
<input name="code" placeholder="code" required><input name="resource" placeholder="resource">
<input name="action" placeholder="action"><input name="ptype" placeholder="ptype">
<input name="name" placeholder="名称"><button>+ 新增权限点</button></form>
<table><thead><tr><th>ID</th><th>Code</th><th>Resource</th><th>Action</th><th>Ptype</th><th>名称</th><th>来源</th></tr></thead><tbody>
{{range .Permissions}}<tr><td>{{.PermissionId}}</td><td>{{.Code}}</td><td>{{.Resource}}</td>
<td>{{.Action}}</td><td>{{.Ptype}}</td><td>{{.Name}}</td><td>{{.Source}}</td></tr>{{end}}
</tbody></table></section></div>{{end}}
