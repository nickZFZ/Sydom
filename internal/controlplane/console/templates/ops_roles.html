{{define "title"}}业务角色 · 运营台 · App {{.AppID}}{{end}}
{{define "content"}}<div class="workspace">
{{template "ops_appnav" .}}
<section>
<nav class="breadcrumb" aria-label="面包屑">运营台 · 业务角色</nav>
{{template "onboarding_banner" .}}
<h1>业务角色</h1>
<a href="/ops/apps/{{.AppID}}/roles/new" class="btn btn-primary">+ 新建业务角色</a>
{{if .Roles}}
<table class="table"><thead><tr><th>角色名称</th><th>操作</th></tr></thead><tbody>
{{range .Roles}}<tr>
<td>{{if .Name}}{{.Name}}{{else}}（未命名）{{end}}</td>
<td><a href="/ops/apps/{{$.AppID}}/roles/{{.RoleId}}/graph">全景</a></td>
</tr>{{end}}
</tbody></table>
{{else}}<p>暂无业务角色。</p>{{end}}
</section></div>{{end}}
