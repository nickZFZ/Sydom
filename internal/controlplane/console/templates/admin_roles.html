{{define "title"}}管理角色 · 司域 Console{{end}}
{{define "content"}}
<h2>管理角色</h2>
<form method="post" action="/admin-roles" class="inline-form">
<input type="hidden" name="csrf_token" value="{{.CSRF}}">
<input name="code" placeholder="code" required><input name="name" placeholder="名称">
<button>+ 新建管理角色</button></form>
{{template "searchbox" .Pager}}
<table><thead><tr>
<th><a href="?{{sortHref $.Pager.SortQuery "id" "asc"}}">ID ↑</a> <a href="?{{sortHref $.Pager.SortQuery "id" "desc"}}">↓</a></th>
<th><a href="?{{sortHref $.Pager.SortQuery "code" "asc"}}">Code ↑</a> <a href="?{{sortHref $.Pager.SortQuery "code" "desc"}}">↓</a></th>
<th>名称</th><th>授权</th></tr></thead><tbody>
{{range .Roles}}<tr><td>{{.RoleId}}</td><td>{{.Code}}</td><td>{{.Name}}</td>
<td>
<form method="post" action="/admin-roles/{{.RoleId}}/grants" class="inline-form">
<input type="hidden" name="csrf_token" value="{{$.CSRF}}">
<input name="domain" placeholder="domain(app_id 或 *)">
<input name="resource" placeholder="resource">
<input name="action" placeholder="action">
<button>授权</button></form>
<form method="post" action="/admin-roles/{{.RoleId}}/revoke-grant" class="inline-form">
<input type="hidden" name="csrf_token" value="{{$.CSRF}}">
<input name="domain" placeholder="domain(app_id 或 *)">
<input name="resource" placeholder="resource">
<input name="action" placeholder="action">
<button>撤销授权</button></form>
</td></tr>{{end}}
</tbody></table>
{{template "pager" .Pager}}
{{end}}
